name: flutter_chat_app
description: Real-time chat thread — Flutter portfolio piece mirroring the Android Clean Arch implementation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Bloc / state management
  flutter_bloc: ^9.1.1

  # Freezed (sealed unions, data classes)
  freezed_annotation: ^3.1.0

  # Drift (reactive SQLite — SSOT DB, replaces Room)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # DI
  get_it: ^9.2.1

  # Navigation
  go_router: ^17.3.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  freezed: ^3.2.5
  build_runner: ^2.4.11

  # Drift codegen
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
